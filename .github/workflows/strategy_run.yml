name: JoinQuant Strategy Auto Run

on:
  schedule:
    # GitHub使用UTC时间。北京时间 13:30 对应 UTC 时间 05:30
    - cron: '30 5 * * 5'
  workflow_dispatch: # 允许在 Actions 页面手动点击执行

permissions:
  contents: write # 赋予修改代码库的权限，用于保存 portfolio_state.json

jobs:
  trade:
    runs-on: ubuntu-latest
    # 👇 新增这一段：强制所有的 JavaScript Actions 使用最新的 Node.js 24
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装运行依赖
        run: pip install -r requirements.txt

      - name: 运行策略代码
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: python strategy.py

      - name: 自动保存账户状态
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add portfolio_state.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "update portfolio state" && git push)
