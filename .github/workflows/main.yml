name: Quant Strategy Daily Run

on:
  schedule:
    - cron: '40 6 * * 1-5' # 北京时间周一至周五 14:40 (UTC 6:40)
  workflow_dispatch: # 允许手动触发

permissions:
  contents: write # 赋予推送代码权限，用于保存 portfolio_state.json

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run strategy
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: python strategy.py

      - name: Commit and push state change
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add portfolio_state.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "update portfolio state [skip ci]" && git push)
