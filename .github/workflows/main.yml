name: Quant Strategy Daily Run

on:
  schedule:
    - cron: '40 6 * * 1-5' # 北京时间周一至周五 14:40 (UTC 6:40)
  workflow_dispatch: # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run strategy
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: python strategy.py

      - name: Commit and push state change
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add portfolio_state.json
          git commit -m "Update portfolio state [skip ci]" || echo "No changes to commit"
          git push
